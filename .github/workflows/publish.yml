name: Publish NuGet Package

# Builds and publishes QPAC.Sculptor to GitHub Packages on every push.
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required for the built-in GITHUB_TOKEN to push packages

jobs:
  publish:
    runs-on: ubuntu-latest   # core targets net7.0/netstandard2.0 — no Windows/WPF needed
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            8.0.x

      - name: Restore
        run: dotnet restore "QPAC Sculptor/QPAC Sculptor.csproj"

      # GeneratePackageOnBuild=true in the csproj, so the build produces the .nupkg.
      # PackageOutputPath is overridden here so it lands in a known, repo-local folder.
      - name: Build & pack
        run: dotnet build "QPAC Sculptor/QPAC Sculptor.csproj" -c Release --no-restore -p:Version=1.0.${{ github.run_number }} -p:PackageOutputPath="${{ github.workspace }}/artifacts"

      # Publishes to the qpacsystems org feed. The repo lives under a personal account,
      # so the built-in GITHUB_TOKEN can't write to the org — use a PAT with write:packages
      # stored as the QPAC_PACKAGES_PAT repo secret. (If this repo is ever transferred into
      # the qpacsystems org, you can switch the api-key back to secrets.GITHUB_TOKEN.)
      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --source "https://nuget.pkg.github.com/qpacsystems/index.json"
          --api-key ${{ secrets.QPAC_PACKAGES_PAT }}
          --skip-duplicate
